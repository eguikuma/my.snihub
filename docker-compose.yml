services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - snihub

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - snihub

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: snihub
      POSTGRES_USER: snihub
      POSTGRES_PASSWORD: snihub
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snihub && psql -U snihub -lqt | grep -q snihub_testing"]
      interval: 5s
      timeout: 5s
      retries: 10
    entrypoint:
      - sh
      - -c
      - |
        docker-entrypoint.sh postgres &
        until pg_isready -U snihub; do sleep 1; done
        psql -U snihub -tc "SELECT 1 FROM pg_database WHERE datname = 'snihub_testing'" | grep -q 1 || psql -U snihub -c "CREATE DATABASE snihub_testing"
        wait
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - snihub

volumes:
  db_data:
  frontend_node_modules:

networks:
  snihub:
