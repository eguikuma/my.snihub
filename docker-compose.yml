services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - snipshare

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      - snipshare

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: snipshare
      POSTGRES_USER: snipshare
      POSTGRES_PASSWORD: snipshare
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snipshare && psql -U snipshare -lqt | grep -q snipshare_testing"]
      interval: 5s
      timeout: 5s
      retries: 10
    entrypoint:
      - sh
      - -c
      - |
        docker-entrypoint.sh postgres &
        until pg_isready -U snipshare; do sleep 1; done
        psql -U snipshare -tc "SELECT 1 FROM pg_database WHERE datname = 'snipshare_testing'" | grep -q 1 || psql -U snipshare -c "CREATE DATABASE snipshare_testing"
        wait
    networks:
      - snipshare

volumes:
  db_data:
  frontend_node_modules:

networks:
  snipshare:
