name: CI

on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: フロントエンド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc
      - run: pnpm lint
      - run: pnpm test

  backend:
    name: バックエンド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: snihub_testing
          POSTGRES_USER: snihub
          POSTGRES_PASSWORD: snihub
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U snihub"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pgsql, pdo_pgsql

      - run: composer install --no-interaction --prefer-dist

      - run: cp .env.example .env

      - run: php artisan key:generate

      - run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: snihub_testing
          DB_USERNAME: snihub
          DB_PASSWORD: snihub
